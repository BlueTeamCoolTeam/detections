title: WmiPrvSE Spawning PowerShell
id: a4d7e823-6c19-4f38-b2a5-8e1c7d4f9b62
status: experimental
description: >
    Detects powershell.exe spawned with WmiPrvSE.exe as the immediate parent.
    When a process is created via WMI Win32_Process.Create, its parent is
    WmiPrvSE.exe rather than the script host that issued the call. This is a
    parent-process laundering technique used by the vimtucdi-ps1-wmi-beacon
    campaign: a JScript .sct launcher created PowerShell via WMI so that
    script-host -> PowerShell detections would not fire.
references:
    - https://blueteam.cool/posts/vimtucdi-ps1-wmi-beacon/
    - https://github.com/BlueTeamCoolTeam/detections/tree/main/campaigns/vimtucdi-ps1-wmi-beacon/
    - https://attack.mitre.org/techniques/T1047/
author: Luke Wilkinson
date: 2026-05-30
tags:
    - attack.execution
    - attack.t1047
    - attack.defense_evasion
    - attack.t1218.010
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        ParentImage|endswith: '\WmiPrvSE.exe'
        Image|endswith: '\powershell.exe'
    condition: selection
falsepositives:
    - Some legitimate automation and monitoring tools create PowerShell processes
      via WMI. Tune with an allowlist of known-legitimate command lines in your environment.
    - SCCM / ConfigMgr and other management tooling may use WMI process creation.
level: high
